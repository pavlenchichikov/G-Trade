name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Линт не требует тяжёлых зависимостей — отрабатывает за секунды
  # и даёт быстрый сигнал, не дожидаясь установки TensorFlow.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint (ruff)
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Tests (pytest)
        env:
          TF_CPP_MIN_LOG_LEVEL: "3"
          CUDA_VISIBLE_DEVICES: ""
        run: pytest tests/ -q
