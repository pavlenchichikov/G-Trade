<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}G-Trade{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/">G-TRADE<span class="brand-dot"></span></a>
      <nav>
        <a href="/" {% if request.url.path == '/' %}class="active"{% endif %}>Радар</a>
        <a href="/market" {% if request.url.path == '/market' %}class="active"{% endif %}>Рынок</a>
        <a href="/sectors" {% if request.url.path == '/sectors' %}class="active"{% endif %}>Секторы</a>
        <a href="/correlations" {% if request.url.path == '/correlations' %}class="active"{% endif %}>Корреляции</a>
        <a href="/performance" {% if request.url.path == '/performance' %}class="active"{% endif %}>Точность</a>
        <a href="/news" {% if request.url.path == '/news' %}class="active"{% endif %}>Новости</a>
        <a href="/guru" {% if request.url.path == '/guru' %}class="active"{% endif %}>Гуру</a>
        <a href="/models" {% if request.url.path == '/models' %}class="active"{% endif %}>Модели</a>
        <a href="/risk" {% if request.url.path == '/risk' %}class="active"{% endif %}>Риск</a>
      </nav>
      <div class="topbar-right">
        <span class="live"><span class="live-dot"></span>{% block topright %}терминал{% endblock %}</span>
      </div>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <span>G-Trade | сигналы не являются инвестиционной рекомендацией</span>
  </footer>
</body>
</html>
